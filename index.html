<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortgage vs Rent</title>
</head>
<body>
  <script>
    (function () {
      var saved = localStorage.getItem("appLang");
      var browser = (navigator.language || "en").toLowerCase();
      var lang = saved || (browser.startsWith("pl") ? "pl" : "en");
      window.location.replace(lang === "pl" ? "app.pl.html" : "app.en.html");
    })();
  </script>
</body>
</html>
